spring:
  application:
    name: xjtuhub-backend
  datasource:
    url: ${MYSQL_JDBC_URL:}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

xjtuhub:
  auth:
    email:
      token-ttl-minutes: ${AUTH_EMAIL_TOKEN_TTL_MINUTES:10}
      debug-return-token: ${AUTH_EMAIL_DEBUG_RETURN_TOKEN:false}
      token-create-limit: ${AUTH_EMAIL_TOKEN_CREATE_LIMIT:5}
      token-create-window-seconds: ${AUTH_EMAIL_TOKEN_CREATE_WINDOW_SECONDS:3600}
      token-verify-limit: ${AUTH_EMAIL_TOKEN_VERIFY_LIMIT:10}
      token-verify-window-seconds: ${AUTH_EMAIL_TOKEN_VERIFY_WINDOW_SECONDS:900}
      from-address: ${AUTH_EMAIL_FROM_ADDRESS:}
      from-name: ${AUTH_EMAIL_FROM_NAME:XJTUhub}
    session:
      cookie-name: ${AUTH_SESSION_COOKIE_NAME:XJTUHUB_SESSION}
      ttl-days: ${AUTH_SESSION_TTL_DAYS:30}
  mysql:
    jdbc-url: ${MYSQL_JDBC_URL:}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
  redis:
    host: ${REDIS_HOST:}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  minio:
    endpoint: ${MINIO_ENDPOINT:}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket-name: ${MINIO_BUCKET_NAME:xjtuhub}
